<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustVision</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>RustVision</h1>
      <div class="lang-switch">
        <button id="lang-en" class="lang-btn active">EN</button>
        <button id="lang-ru" class="lang-btn">RU</button>
      </div>
    </header>

    <div class="section">
      <label class="checkbox-label">
        <input type="checkbox" id="auto-mode">
        <span data-i18n="autoMode">Auto mode</span>
      </label>
      <div class="row">
        <span data-i18n="bind">Bind:</span>
        <button id="auto-bind-btn" class="btn bind-btn">F9</button>
      </div>
      <div class="row">
        <span data-i18n="process">Process:</span>
        <input type="text" id="target-process" value="RustClient.exe" class="input">
      </div>
    </div>

    <div class="section">
      <div class="row">
        <span data-i18n="toggleBind">Toggle bind:</span>
        <button id="toggle-bind-btn" class="btn bind-btn">F8</button>
      </div>
    </div>

    <div class="section">
      <button id="manual-toggle-btn" class="btn btn-toggle-main" data-i18n="toggle">Toggle</button>
    </div>

    <div class="section">
      <label data-i18n="monitors">Monitors:</label>
      <div id="monitor-list" class="monitor-list"></div>
    </div>

    <div class="section sliders">
      <div class="slider-row">
        <label data-i18n="gamma">Gamma</label>
        <div class="slider-wrap">
          <input type="range" id="gamma" min="0.1" max="10.0" step="0.01" value="1.0">
          <div class="slider-center-mark"></div>
        </div>
        <span id="gamma-val" class="slider-val">1.00</span>
      </div>
      <div class="slider-row">
        <label data-i18n="brightness">Brightness</label>
        <div class="slider-wrap">
          <input type="range" id="brightness" min="0.0" max="1.0" step="0.01" value="0.5">
          <div class="slider-center-mark"></div>
        </div>
        <span id="brightness-val" class="slider-val">0.50</span>
      </div>
      <div class="slider-row">
        <label data-i18n="contrast">Contrast</label>
        <div class="slider-wrap">
          <input type="range" id="contrast" min="0.0" max="1.0" step="0.01" value="0.5">
          <div class="slider-center-mark"></div>
        </div>
        <span id="contrast-val" class="slider-val">0.50</span>
      </div>
    </div>

    <div class="footer">
      <button id="reset-btn" class="btn" data-i18n="reset">Reset</button>
      <div id="status" class="status-inactive">
        <span class="status-dot"></span>
        <span data-i18n="waiting">Waiting..</span>
      </div>
    </div>
  </div>

  <script>
    const { invoke, listen } = window.__TAURI__.core;

    const SNAP_DIST = 0.04;
    const defaults = { gamma: 1.0, brightness: 0.5, contrast: 0.5 };

    let lang = 'en';

    const i18n = {
      en: {
        autoMode: 'Auto mode', bind: 'Bind:', process: 'Process:',
        toggleBind: 'Toggle bind:', monitors: 'Monitors:',
        gamma: 'Gamma', brightness: 'Brightness', contrast: 'Contrast',
        reset: 'Reset', waiting: 'Waiting..', active: 'Active..',
        toggle: 'Toggle', listening: 'Press any key...',
      },
      ru: {
        autoMode: 'Авто-режим', bind: 'Бинд:', process: 'Процесс:',
        toggleBind: 'Бинд вкл/выкл:', monitors: 'Мониторы:',
        gamma: 'Гамма', brightness: 'Яркость', contrast: 'Контрастность',
        reset: 'Сброс', waiting: 'Жду..', active: 'Работаю..',
        toggle: 'Вкл/Выкл', listening: 'Нажмите клавишу...',
      },
    };

    function formatKey(code) {
      if (code >= 0x70 && code <= 0x87) return 'F' + (code - 0x6F);
      if (code === 0x08) return 'BACK';
      if (code === 0x20) return 'SPACE';
      if (code >= 0x30 && code <= 0x39) return String.fromCharCode(code);
      if (code >= 0x41 && code <= 0x5A) return String.fromCharCode(code);
      return '0x' + code.toString(16).toUpperCase();
    }

    function setLang(l) {
      lang = l;
      document.getElementById('lang-en').classList.toggle('active', l === 'en');
      document.getElementById('lang-ru').classList.toggle('active', l === 'ru');
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[l][key]) el.textContent = i18n[l][key];
      });
      const toggleBtn = document.getElementById('manual-toggle-btn');
      if (toggleBtn) toggleBtn.textContent = i18n[l].toggle;
    }

    function setStatus(active) {
      const el = document.getElementById('status');
      el.classList.toggle('status-active', active);
      el.classList.toggle('status-inactive', !active);
      const key = active ? 'active' : 'waiting';
      el.querySelector('span:last-child').textContent = i18n[lang][key];
    }

    function setBindButtonListening(target) {
      const btnId = target === 'toggle' ? 'toggle-bind-btn' : 'auto-bind-btn';
      const btn = document.getElementById(btnId);
      btn.textContent = i18n[lang].listening;
      btn.classList.add('listening');

      const handler = (event) => {
        const { target: t, code } = event.payload;
        if (t === target) {
          btn.textContent = formatKey(code);
          btn.classList.remove('listening');
          listenCleanup();
        }
      };
      const listenCleanup = listen('key_captured', handler);
    }

    document.getElementById('toggle-bind-btn').addEventListener('click', () => {
      invoke('start_key_capture', { target: 'toggle' });
      setBindButtonListening('toggle');
    });

    document.getElementById('auto-bind-btn').addEventListener('click', () => {
      invoke('start_key_capture', { target: 'auto' });
      setBindButtonListening('auto');
    });

    document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
    document.getElementById('lang-ru').addEventListener('click', () => setLang('ru'));

    async function loadMonitors() {
      const monitors = await invoke('get_monitors');
      const list = document.getElementById('monitor-list');
      list.innerHTML = '';
      if (monitors.length === 0) return;

      monitors.forEach(m => {
        const item = document.createElement('label');
        item.className = 'monitor-item';
        const checked = m.is_primary ? 'checked' : '';
        item.innerHTML = `
          <input type="checkbox" value="${m.name}" ${checked} onchange="sendSettings()">
          <span>${m.label}</span>
        `;
        list.appendChild(item);
      });
    }

    function getSelectedMonitors() {
      const selected = [];
      document.querySelectorAll('#monitor-list input[type="checkbox"]').forEach(cb => {
        if (cb.checked) selected.push(cb.value);
      });
      return selected;
    }

    async function sendSettings() {
      const gamma = parseFloat(document.getElementById('gamma').value);
      const brightness = parseFloat(document.getElementById('brightness').value);
      const contrast = parseFloat(document.getElementById('contrast').value);
      await invoke('apply_settings', {
        settings: {
          gamma,
          brightness,
          contrast,
          selected_monitors: getSelectedMonitors(),
        },
      });
    }

    function magnetizeValue(raw, center) {
      return Math.abs(raw - center) < SNAP_DIST ? center : raw;
    }

    const gammaSlider = document.getElementById('gamma');
    const brightnessSlider = document.getElementById('brightness');
    const contrastSlider = document.getElementById('contrast');

    [gammaSlider, brightnessSlider, contrastSlider].forEach(slider => {
      slider.addEventListener('input', () => {
        const id = slider.id;
        document.getElementById(id + '-val').textContent = parseFloat(slider.value).toFixed(2);
      });

      slider.addEventListener('change', () => {
        let raw = parseFloat(slider.value);
        const center = slider.id === 'gamma' ? defaults.gamma : 0.5;
        const magnetized = magnetizeValue(raw, center);
        slider.value = magnetized;
        document.getElementById(slider.id + '-val').textContent = magnetized.toFixed(2);
        sendSettings();
      });
    });

    document.getElementById('auto-mode').addEventListener('change', (e) => {
      invoke('set_auto_mode', { enabled: e.target.checked });
    });

    document.getElementById('target-process').addEventListener('change', (e) => {
      invoke('set_target_process', { target: e.target.value });
    });

    document.getElementById('manual-toggle-btn').addEventListener('click', () => {
      invoke('toggle');
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      gammaSlider.value = defaults.gamma;
      brightnessSlider.value = defaults.brightness;
      contrastSlider.value = defaults.contrast;
      document.getElementById('gamma-val').textContent = defaults.gamma.toFixed(2);
      document.getElementById('brightness-val').textContent = defaults.brightness.toFixed(2);
      document.getElementById('contrast-val').textContent = defaults.contrast.toFixed(2);
      sendSettings();
      invoke('restore_all');
    });

    async function init() {
      setLang('en');
      await loadMonitors();

      listen('status_change', (e) => setStatus(e.payload));
      listen('auto_mode_change', (e) => {
        document.getElementById('auto-mode').checked = e.payload;
      });
    }

    init();
  </script>
</body>
</html>
